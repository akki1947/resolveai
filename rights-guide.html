        // Rights Display Handler
        const display = {
            getCategories() {
                return Object.values(RightsDatabase).map(cat => ({
                    id: cat.id,
                    name: cat.name,
                    icon: cat.icon,
                    color: cat.color,
                    issueCount: cat.issues.length
                }));
            },

            getCategory(categoryId) {
                return RightsDatabase[categoryId];
            },

            getIssue(categoryId, issueId) {
                const category = RightsDatabase[categoryId];
                return category?.issues.find(i => i.id === issueId);
            },

            search(query) {
                if (!query) return [];
                const q = query.toLowerCase();
                const results = [];

                Object.values(RightsDatabase).forEach(category => {
                    category.issues.forEach(issue => {
                        const matches = 
                            issue.title.toLowerCase().includes(q) ||
                            issue.description.toLowerCase().includes(q) ||
                            issue.rights.some(r => r.toLowerCase().includes(q)) ||
                            category.name.toLowerCase().includes(q) ||
                            (issue.documents && issue.documents.some(d => d.toLowerCase().includes(q)));

                        if (matches) {
                            results.push({
                                categoryId: category.id,
                                categoryName: category.name,
                                categoryIcon: category.icon,
                                issue: issue
                            });
                        }
                    });
                });

                return results.slice(0, 10);
            },

            formatRights(issue, category) {
                return `
                    <div class="rights-detail">
                        <div class="detail-header">
                            <span class="category-icon">${category.icon}</span>
                            <h2>${issue.title}</h2>
                        </div>
                        
                        <div class="authority-box">
                            <strong>⚖️ Regulatory Authority:</strong> ${category.authorities[0].name}<br>
                            <strong>📞 Helpline:</strong> ${category.authorities[0].helpline}<br>
                            <strong>🌐 Portal:</strong> <a href="${category.authorities[0].portal}" target="_blank">${category.authorities[0].portal}</a>
                        </div>

                        <div class="info-section">
                            <h3>📋 Your Rights</h3>
                            <ul>${issue.rights.map(r => `<li>${r}</li>`).join('')}</ul>
                        </div>

                        <div class="info-section">
                            <h3>💰 Compensation</h3>
                            <p>${issue.compensation}</p>
                        </div>

                        <div class="info-section">
                            <h3>📝 Process</h3>
                            <ol>${issue.process.map(p => `<li>${p}</li>`).join('')}</ol>
                        </div>

                        <div class="info-section">
                            <h3>📎 Documents Needed</h3>
                            <ul>${issue.documents.map(d => `<li>${d}</li>`).join('')}</ul>
                        </div>

                        <div class="info-section">
                            <h3>📄 Sample Complaint Script</h3>
                            <div class="script-box">${issue.sampleScript.replace(/\n/g, '<br>')}</div>
                            <button class="copy-btn" onclick="copyScript(this)">Copy Script</button>
                        </div>

                        <div class="action-buttons">
                            <a href="complaint.html?category=${category.id}&issue=${issue.id}" class="btn-primary">File Complaint</a>
                            <button class="btn-secondary" onclick="window.print()">Print Guide</button>
                        </div>
                    </div>
                `;
            }
        };

        // UI Functions
        function showCategories() {
            const container = document.getElementById('categoriesContainer');
            const categories = display.getCategories();
            
            container.innerHTML = categories.map(cat => {
                const category = display.getCategory(cat.id);
                return `
                    <div class="category-card" onclick="showCategory('${cat.id}')">
                        <div class="category-icon">${cat.icon}</div>
                        <div class="category-name">${cat.name}</div>
                        <div class="issue-count">${cat.issueCount} common issues</div>
                        <div class="issues-list">
                            ${category.issues.slice(0, 3).map(issue => 
                                `<div class="issue-item">• ${issue.title}</div>`
                            ).join('')}
                            ${category.issues.length > 3 ? '<div class="issue-item">• And more...</div>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.showCategory = function(categoryId) {
            const category = display.getCategory(categoryId);
            const container = document.getElementById('categoriesContainer');
            const detailContainer = document.getElementById('detailContainer');
            
            let issuesHtml = '';
            category.issues.forEach(issue => {
                issuesHtml += `
                    <div class="result-card" onclick="showIssue('${categoryId}', '${issue.id}')">
                        <div class="result-title">${issue.title}</div>
                        <div class="result-category">${issue.description}</div>
                    </div>
                `;
            });
            
            detailContainer.innerHTML = `
                <button class="back-button" onclick="hideDetail()">← Back to categories</button>
                <div class="detail-header">
                    <span class="category-icon">${category.icon}</span>
                    <h2>${category.name}</h2>
                </div>
                <div class="authority-box">
                    <strong>⚖️ Regulatory Authority:</strong> ${category.authorities[0].name}<br>
                    <strong>📞 Helpline:</strong> ${category.authorities[0].helpline}<br>
                    <strong>🌐 Portal:</strong> <a href="${category.authorities[0].portal}" target="_blank">${category.authorities[0].portal}</a>
                </div>
                <h3>Select an issue:</h3>
                <div class="results-grid">${issuesHtml}</div>
            `;
            
            container.classList.add('hidden');
            detailContainer.classList.remove('hidden');
        };

        window.showIssue = function(categoryId, issueId) {
            const category = display.getCategory(categoryId);
            const issue = display.getIssue(categoryId, issueId);
            const detailContainer = document.getElementById('detailContainer');
            
            detailContainer.innerHTML = `
                <button class="back-button" onclick="showCategory('${categoryId}')">← Back to ${category.name}</button>
                ${display.formatRights(issue, category)}
            `;
        };

        window.hideDetail = function() {
            document.getElementById('categoriesContainer').classList.remove('hidden');
            document.getElementById('detailContainer').classList.add('hidden');
        };

        window.copyScript = function(btn) {
            const script = btn.previousElementSibling.innerText;
            navigator.clipboard.writeText(script).then(() => {
                alert('Script copied to clipboard!');
            });
        };

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value;
            const container = document.getElementById('categoriesContainer');
            const detailContainer = document.getElementById('detailContainer');
            
            if (query.length < 2) {
                showCategories();
                detailContainer.classList.add('hidden');
                return;
            }
            
            const results = display.search(query);
            
            if (results.length > 0) {
                container.innerHTML = results.map(r => `
                    <div class="result-card" onclick="showIssue('${r.categoryId}', '${r.issue.id}')">
                        <div class="result-title">${r.categoryIcon} ${r.issue.title}</div>
                        <div class="result-category">${r.categoryName}</div>
                    </div>
                `).join('');
                detailContainer.classList.add('hidden');
            } else {
                container.innerHTML = '<p style="text-align: center; color: #64748b;">No results found. Try different keywords.</p>';
            }
        });

        // Initialize
        showCategories();
    </script>
</body>
</html>
