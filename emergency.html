            border: 1px solid #cbd5e1;

        table {

        th {

            padding: 12px;
            background: #f8fafc;

            color: #475569;

            if (window.location.pathname !== '/' && !window.location.pathname.endsWith('index.html')) {
                const homeLink = document.getElementById('header-home-link');

    <div class="container">

            <!-- State and District Selection -->

                <select id="state" onchange="updateDistricts()">
                    <option value="">-- Choose State --</option>

            <div class="form-group">
                <label for="district">Select District</label>

                    ]

                {

                    "website": "https://maharashtra.gov.in",
                    "major_cities": ["Mumbai", "Pune", "Nagpur", "Nashik"],
                    "emergency_numbers": {
                        "police": "100",

                    },
                    "districts": [
                        {

                        },

                    "state": "Tamil Nadu",

                    },

                        {

                        }
                    ]
                }
            ]
        };

        // Display national numbers
        function displayNationalNumbers() {
            const national = emergencyData.national_emergency_numbers;
            let html = '<h2>🇮🇳 National Emergency Numbers</h2><div class="numbers-grid">';

            const formatNumber = (num) => Array.isArray(num) ? num.join(' / ') : num;

            html += `
                <div class="number-item"><div class="number-label">Unified Emergency</div><div class="number-value">${national.unified_emergency}</div><div class="number-desc">All emergencies</div></div>
                <div class="number-item"><div class="number-label">Police</div><div class="number-value">${national.police}</div><div class="number-desc">General police</div></div>
                <div class="number-item"><div class="number-label">Fire</div><div class="number-value">${national.fire}</div><div class="number-desc">Fire brigade</div></div>
                <div class="number-item"><div class="number-label">Ambulance</div><div class="number-value">${formatNumber(national.ambulance)}</div><div class="number-desc">Medical emergency</div></div>
                <div class="number-item"><div class="number-label">Women Helpline</div><div class="number-value">${formatNumber(national.women_helpline)}</div><div class="number-desc">Women in distress</div></div>
                <div class="number-item"><div class="number-label">Child Helpline</div><div class="number-value">${national.child_helpline}</div><div class="number-desc">Children in need</div></div>
                <div class="number-item"><div class="number-label">Cyber Crime</div><div class="number-value">${national.cyber_crime}</div><div class="number-desc">Online fraud</div></div>
                <div class="number-item"><div class="number-label">Disaster Management</div><div class="number-value">${national.disaster_management_state}</div><div class="number-desc">State disaster control</div></div>
                <div class="number-item"><div class="number-label">District Control</div><div class="number-value">${national.district_control_room}</div><div class="number-desc">District emergency</div></div>
                <div class="number-item"><div class="number-label">Highway Accident</div><div class="number-value">${national.road_accident_highway}</div><div class="number-desc">Road accidents</div></div>
            `;
            html += '</div>';
            document.getElementById('nationalNumbers').innerHTML = html;
        }

        // Populate state dropdown
        function populateStates() {
            const stateSelect = document.getElementById('state');
            emergencyData.states.forEach(s => {
                const option = document.createElement('option');
                option.value = s.state;
                option.textContent = s.state;
                stateSelect.appendChild(option);
            });
        }

        // Update district dropdown based on selected state
        function updateDistricts() {
            const stateName = document.getElementById('state').value;
            const districtSelect = document.getElementById('district');
            const contactsDiv = document.getElementById('districtContacts');
            
            districtSelect.innerHTML = '<option value="">-- Select District --</option>';
            contactsDiv.innerHTML = '';

            if (!stateName) {
                districtSelect.disabled = true;
                return;
            }

            districtSelect.disabled = false;
            const state = emergencyData.states.find(s => s.state === stateName);
            
            if (state && state.districts && state.districts.length > 0) {
                state.districts.forEach(d => {
                    const option = document.createElement('option');
                    option.value = d.district;
                    option.textContent = `${d.district} (${d.major_city})`;
                    districtSelect.appendChild(option);
                });
            } else {
                const option = document.createElement('option');
                option.value = "";
                option.textContent = "No districts available";
                option.disabled = true;
                districtSelect.appendChild(option);
            }
        }

        // Show district-specific contacts
        function showDistrictContacts() {
            const stateName = document.getElementById('state').value;
            const districtName = document.getElementById('district').value;
            const contactsDiv = document.getElementById('districtContacts');

            if (!stateName || !districtName) return;

            const state = emergencyData.states.find(s => s.state === stateName);
            const district = state?.districts.find(d => d.district === districtName);
            
            if (!district) return;

            const cr = district.control_room;
            contactsDiv.innerHTML = `
                <div class="district-info">
                    <strong>📍 ${district.district} (${district.major_city})</strong><br>
                    <a href="${district.website}" target="_blank">District Official Website</a>
                </div>
                <table>
                    <thead><tr><th>Department</th><th>Phone</th></tr></thead>
                    <tbody>
                        <tr><td class="department">🚓 Police</td><td class="phone"><a href="tel:${cr.police}">${cr.police}</a></td></tr>
                        <tr><td class="department">🚑 Ambulance</td><td class="phone"><a href="tel:${cr.ambulance}">${cr.ambulance}</a></td></tr>
                        <tr><td class="department">🔥 Fire</td><td class="phone"><a href="tel:${cr.fire}">${cr.fire}</a></td></tr>
                        <tr><td class="department">🆘 Disaster Control</td><td class="phone"><a href="tel:${cr.disaster_control}">${cr.disaster_control}</a></td></tr>
                    </tbody>
                </table>
            `;
        }

        // Initialize page
        window.onload = function() {
            displayNationalNumbers();
            populateStates();
        };
    </script>
