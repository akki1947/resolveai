    <div class="container">
        <div class="card">
            <h1>Emergency Contacts – Pan India</h1>
            <div class="subhead">Select your state and city to find local emergency numbers.</div>

            <div class="form-group">
                <label for="state">State</label>
                <select id="state" onchange="updateCities()">
                    <option value="">-- Select State --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="city">City / District</label>
                <select id="city" onchange="showContacts()" disabled>
                    <option value="">-- Select City --</option>
                </select>
            </div>

            <div id="contactDisplay">
                <!-- Table will be inserted here -->
            </div>
        </div>

        <div class="footer">
            <p>© 2026 ResolveAI – Emergency contact information is compiled from public sources. Please verify locally.</p>
        </div>
    </div>

    <script>
        let emergencyData = {};

        // Load JSON data
        fetch('/emergency_contacts.json')
            .then(response => response.json())
            .then(data => {
                emergencyData = data;
                populateStates();
            })
            .catch(error => console.error('Error loading emergency contacts:', error));

        function populateStates() {
            const stateSelect = document.getElementById('state');
            stateSelect.innerHTML = '<option value="">-- Select State --</option>';
            Object.keys(emergencyData).sort().forEach(state => {
                const option = document.createElement('option');
                option.value = state;
                option.textContent = state;
                stateSelect.appendChild(option);
            });
        }

        function updateCities() {
            const state = document.getElementById('state').value;
            const citySelect = document.getElementById('city');
            const contactDisplay = document.getElementById('contactDisplay');
            citySelect.innerHTML = '<option value="">-- Select City --</option>';
            citySelect.disabled = !state;
            contactDisplay.innerHTML = '';

            if (state && emergencyData[state]) {
                Object.keys(emergencyData[state]).sort().forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    citySelect.appendChild(option);
                });
            }
        }

        function showContacts() {
            const state = document.getElementById('state').value;
            const city = document.getElementById('city').value;
            const contactDisplay = document.getElementById('contactDisplay');

            if (!state || !city || !emergencyData[state] || !emergencyData[state][city]) {
                contactDisplay.innerHTML = '';
                return;
            }

            const contacts = emergencyData[state][city];
            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th>Department</th>
                            <th>Phone</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            contacts.forEach(contact => {
                tableHtml += `
                    <tr>
                        <td class="department">${contact.department}</td>
                        <td class="phone"><a href="tel:${contact.phone}">${contact.phone}</a></td>
                        <td class="description">${contact.description}</td>
                    </tr>
                `;
            });

            tableHtml += '</tbody></table>';
            contactDisplay.innerHTML = tableHtml;
        }
    </script>
