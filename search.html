            { title: 'Prestige Construction Delay', category: 'Real Estate', sector: 'realestate', company: 'Prestige Group', keywords: ['prestige', 'construction', 'delay', 'work'], authority: 'RERA', helpline: 'Varies by state', description: 'Construction delay' },
            { title: 'Prestige Quality Issue', category: 'Real Estate', sector: 'realestate', company: 'Prestige Group', keywords: ['prestige', 'quality', 'defects'], authority: 'RERA', helpline: 'Varies by state', description: 'Quality defects' },

            { title: 'Tata Housing Project', category: 'Real Estate', sector: 'realestate', company: 'Tata Housing', keywords: ['tata', 'housing', 'project'], authority: 'RERA', helpline: 'Varies by state', description: 'Housing project issue' },
            
            { title: 'Brigade Group Issue', category: 'Real Estate', sector: 'realestate', company: 'Brigade Group', keywords: ['brigade', 'property'], authority: 'RERA', helpline: 'Varies by state', description: 'Real estate issue' },
            
            { title: 'General Real Estate Delay', category: 'Real Estate', sector: 'realestate', company: 'Various', keywords: ['real estate', 'builder', 'delay', 'possession', 'project'], authority: 'RERA', helpline: 'Varies by state', description: 'Project or possession delay' },
            { title: 'General Real Estate Quality', category: 'Real Estate', sector: 'realestate', company: 'Various', keywords: ['construction', 'quality', 'defects', 'cracks'], authority: 'RERA', helpline: 'Varies by state', description: 'Poor construction quality' },
            { title: 'General Real Estate Misleading', category: 'Real Estate', sector: 'realestate', company: 'Various', keywords: ['misleading', 'false', 'promises', 'ads'], authority: 'RERA', helpline: 'Varies by state', description: 'False project claims' },
            { title: 'General RERA Complaint', category: 'Real Estate', sector: 'realestate', company: 'Various', keywords: ['rera', 'complaint', 'registration'], authority: 'RERA', helpline: 'Varies by state', description: 'RERA related complaint' }
        ];

        // Get unique sectors for filters
        const sectors = [...new Set(searchDatabase.map(item => item.category))];
        
        // Populate filters
        const filtersDiv = document.getElementById('filters');
        filtersDiv.innerHTML = '<span class="filter-chip active" onclick="filterByCategory(\'all\')">All</span>' +
            sectors.map(s => `<span class="filter-chip" onclick="filterByCategory('${s}')">${s}</span>`).join('');

        let currentFilter = 'all';

        window.filterByCategory = function(category) {
            currentFilter = category;
            // Update active state
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            event.target.classList.add('active');
            performSearch();
        };

        window.performSearch = function() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                resultsDiv.innerHTML = '<div class="loading">Enter a search term to begin</div>';
                return;
            }
            
            // Filter results
            const results = searchDatabase.filter(item => {
                // Check filter
                if (currentFilter !== 'all' && item.category !== currentFilter) {
                    return false;
                }
                
                // Check search query
                return item.keywords.some(keyword => 
                    keyword.toLowerCase().includes(query)
                ) || item.title.toLowerCase().includes(query);
            });
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">No results found. Try different keywords.</div>';
                return;
            }
            
            // Display results
            resultsDiv.innerHTML = results.map(item => `
                <div class="result-card" onclick="selectResult('${item.sector}')">
                    <div class="result-title">${item.title}</div>
                    <div class="result-meta">
                        <span>📋 ${item.category}</span>
                        <span>⚖️ ${item.authority}</span>
                    </div>
                    <div class="result-description">${item.description}</div>
                    <div class="result-actions">
                        <button class="action-btn primary" onclick="event.stopPropagation(); window.location.href='complaint.html?sector=${item.sector}'">File Complaint</button>
                        <button class="action-btn" onclick="event.stopPropagation(); window.location.href='rights-guide.html'">Learn More</button>
                    </div>
                </div>
            `).join('');
        };

        window.selectResult = function(sector) {
            window.location.href = `complaint.html?sector=${sector}`;
        };

        // Handle enter key
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Check for URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const queryParam = urlParams.get('q');
        if (queryParam) {
            document.getElementById('searchInput').value = queryParam;
            performSearch();
        }
    </script>
</body>
