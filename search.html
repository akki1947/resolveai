<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Search – ResolveAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/js/config.js" type="module"></script>
    <script src="/js/data-service.js" type="module"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            line-height: 1.6;
        }
        header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: #0f172a;
            text-decoration: none;
        }
        .logo span {
            color: #2563eb;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .nav-links a {
            color: #475569;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .nav-links a:hover {
            color: #2563eb;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .search-hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .search-hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 16px;
        }
        .search-hero p {
            color: #64748b;
            font-size: 1.1rem;
        }
        .search-box {
            background: white;
            border-radius: 60px;
            padding: 8px 8px 8px 24px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 16px -8px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
        }
        .search-box input {
            flex: 1;
            border: none;
            padding: 16px 0;
            font-size: 1.1rem;
            outline: none;
            background: transparent;
        }
        .search-box button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-box button:hover {
            background: #1d4ed8;
        }
        .search-filters {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .filter-chip {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-chip:hover {
            border-color: #2563eb;
            background: #f0f9ff;
        }
        .filter-chip.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .result-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            opacity: 0;
            transform: translateY(20px);
            animation: slideIn 0.3s ease forwards;
        }
        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-card:hover {
            box-shadow: 0 12px 24px -8px rgba(0,0,0,0.1);
            border-color: #2563eb;
        }
        .result-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
        }
        .result-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #475569;
            font-size: 0.9rem;
        }
        .meta-item i {
            color: #2563eb;
        }
        .result-description {
            color: #64748b;
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .result-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #f1f5f9;
            color: #1e293b;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .action-btn.primary {
            background: #2563eb;
            color: white;
        }
        .action-btn:hover {
            background: #e2e8f0;
        }
        .action-btn.primary:hover {
            background: #1d4ed8;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .suggestion-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .suggestion-pill {
            background: #e2e8f0;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .suggestion-pill:hover {
            background: #cbd5e1;
        }
        footer {
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 60px;
            padding: 20px;
            border-top: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">Resolve<span>AI</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="search.html">Search</a>
                <a href="advisor.html">AI Advisor</a>
                <a href="negotiation.html">AI Negotiator</a>
                <a href="knowledge.html">Guide</a>
                <a href="emergency.html">Emergency</a>
                <a href="dashboard.html" id="dashboard-link" style="display:none;">Dashboard</a>
                <a href="#" id="logout-link" onclick="logout()" style="display:none;">Logout</a>
                <a href="login.html" id="login-link">Login</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="search-hero">
            <h1>Smart Complaint Search</h1>
            <p>Find the right authority and complaint process in seconds</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="e.g., 'Amazon not refunding', 'Airtel network issue', 'Bank fraud'..." autofocus>
            <button onclick="performSearch()">Search</button>
        </div>

        <div class="suggestion-pills" id="suggestionPills"></div>

        <div class="search-filters" id="filterContainer"></div>

        <div id="resultsContainer" class="results-container"></div>
    </div>

    <footer>
        <p>© 2026 ResolveAI – Smart Consumer Complaint Platform</p>
    </footer>

    <script type="module">
        import CONFIG from '/js/config.js';
        import { dataService } from '/js/data-service.js';

        // Initialize Supabase
        const supabase = window.supabase.createClient(CONFIG.supabase.url, CONFIG.supabase.anonKey);

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        supabase.auth.getSession().then(({ data: { session } }) => {
            const loginLink = document.getElementById('login-link');
            const logoutLink = document.getElementById('logout-link');
            const dashboardLink = document.getElementById('dashboard-link');
            
            if (session) {
                loginLink.style.display = 'none';
                logoutLink.style.display = 'inline';
                dashboardLink.style.display = 'inline';
            } else {
                loginLink.style.display = 'inline';
                logoutLink.style.display = 'none';
                dashboardLink.style.display = 'none';
            }
        });

        // Search functionality
        let categoriesData = null;
        let companiesData = null;
        let searchIndex = [];

        // Load data
        async function initializeSearch() {
            try {
                const [categories, companies] = await Promise.all([
                    dataService.getComplaintCategories(),
                    dataService.getCompanies()
                ]);
                
                categoriesData = categories;
                companiesData = companies;
                buildSearchIndex();
                populateFilters();
                populateSuggestions();
            } catch (error) {
                showError('Failed to load search data');
            }
        }

        function buildSearchIndex() {
            searchIndex = [];
            
            categoriesData.sectors.forEach(sector => {
                sector.categories.forEach(category => {
                    category.types.forEach(type => {
                        // Add to search index
                        searchIndex.push({
                            type: 'grievance',
                            sector: sector.name,
                            sectorId: sector.id,
                            category: category.name,
                            typeName: type.name,
                            details: type.details,
                            authority: type.suggested_authority,
                            authorityId: type.authority,
                            evidence: type.evidence,
                            keywords: [...type.keywords, type.name, category.name, sector.name]
                        });
                    });
                });
            });
            
            // Add companies to search index
            Object.entries(companiesData.sectors).forEach(([sectorId, sector]) => {
                sector.companies.forEach(company => {
                    searchIndex.push({
                        type: 'company',
                        company: company,
                        sector: sector.name,
                        sectorId: sectorId
                    });
                });
            });
        }

        function populateFilters() {
            const filterContainer = document.getElementById('filterContainer');
            const sectors = [...new Set(categoriesData.sectors.map(s => s.name))];
            
            filterContainer.innerHTML = `
                <span class="filter-chip active" onclick="filterBySector('all')">All</span>
                ${sectors.map(sector => 
                    `<span class="filter-chip" onclick="filterBySector('${sector}')">${sector}</span>`
                ).join('')}
            `;
        }

        function populateSuggestions() {
            const suggestions = [
                "Amazon not refunding",
                "Airtel network issue",
                "Bank fraud transaction",
                "Flight cancelled refund",
                "Insurance claim rejected"
            ];
            
            const container = document.getElementById('suggestionPills');
            container.innerHTML = suggestions.map(s => 
                `<span class="suggestion-pill" onclick="setSearch('${s}')">🔍 ${s}</span>`
            ).join('');
        }

        window.setSearch = function(query) {
            document.getElementById('searchInput').value = query;
            performSearch();
        };

        window.filterBySector = function(sector) {
            // Update active filter UI
            document.querySelectorAll('.filter-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Perform search with filter
            const query = document.getElementById('searchInput').value;
            performSearch(query, sector);
        };

        async function performSearch(query, sectorFilter = 'all') {
            const searchQuery = query || document.getElementById('searchInput').value;
            const container = document.getElementById('resultsContainer');
            
            if (!searchQuery.trim()) {
                container.innerHTML = '<div class="loading">Enter a search term to begin</div>';
                return;
            }
            
            container.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    Searching...
                </div>
            `;
            
            // Simulate search delay for smooth UX
            setTimeout(() => {
                const results = searchIndex.filter(item => {
                    const matchesQuery = item.keywords ? 
                        item.keywords.some(k => k.toLowerCase().includes(searchQuery.toLowerCase())) :
                        item.company.toLowerCase().includes(searchQuery.toLowerCase());
                    
                    const matchesSector = sectorFilter === 'all' || item.sector === sectorFilter;
                    
                    return matchesQuery && matchesSector;
                });
                
                displayResults(results.slice(0, 10)); // Limit to 10 results
            }, 300);
        }

        function displayResults(results) {
            const container = document.getElementById('resultsContainer');
            
            if (results.length === 0) {
                container.innerHTML = `
                    <div class="error-message">
                        No results found. Try different keywords or browse our guides.
                    </div>
                `;
                return;
            }
            
            container.innerHTML = results.map(item => {
                if (item.type === 'grievance') {
                    return `
                        <div class="result-card" style="animation-delay: ${Math.random() * 0.2}s">
                            <div class="result-title">${item.sector}: ${item.typeName}</div>
                            <div class="result-meta">
                                <span class="meta-item"><i>📋</i> ${item.category}</span>
                                <span class="meta-item"><i>⚖️</i> ${item.authority}</span>
                            </div>
                            <div class="result-description">${item.details}</div>
                            <div class="result-actions">
                                <a href="complaint.html?sector=${item.sectorId}" class="action-btn primary">File Complaint</a>
                                <a href="advisor.html?q=${encodeURIComponent(item.typeName)}" class="action-btn">Ask AI Advisor</a>
                                <a href="#" class="action-btn" onclick="showEvidence('${item.evidence.join('||')}')">📋 Evidence</a>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="result-card" style="animation-delay: ${Math.random() * 0.2}s">
                            <div class="result-title">${item.company}</div>
                            <div class="result-meta">
                                <span class="meta-item"><i>🏢</i> ${item.sector}</span>
                            </div>
                            <div class="result-actions">
                                <a href="complaint.html?sector=${item.sectorId}&company=${encodeURIComponent(item.company)}" class="action-btn primary">File Complaint</a>
                                <a href="search.html?q=${encodeURIComponent(item.company)}" class="action-btn">View Issues</a>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        window.showEvidence = function(evidenceList) {
            const items = evidenceList.split('||');
            alert('Required Evidence:\n• ' + items.join('\n• '));
        };

        window.performSearch = function() {
            performSearch();
        };

        // Initialize on load
        initializeSearch();
    </script>
</body>
</html>
