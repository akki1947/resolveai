<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – ResolveAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0f172a;
        }
        .subhead {
            color: #64748b;
            margin-bottom: 32px;
        }
        label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #475569;
            display: block;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-size: 1rem;
            margin-bottom: 24px;
            outline: none;
        }
        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn {
            background: #2563eb;
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        .toggle {
            text-align: center;
            color: #2563eb;
            cursor: pointer;
            font-weight: 500;
        }
        .error {
            color: #b91c1c;
            background: #fee2e2;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .footer-note {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 0.8rem;
        }
        a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Resolve<span style="color:#2563eb;">AI</span></h1>
        <div class="subhead" id="form-title">Sign in to your account</div>

        <div id="error-message" class="error"></div>

        <form id="auth-form" onsubmit="handleAuth(event)">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>

            <button type="submit" class="btn" id="submit-btn">Sign In</button>
        </form>

        <div class="toggle" id="toggle-link" onclick="toggleMode()">Don't have an account? Sign up</div>

        <div class="footer-note">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://qdymteenojnjwgblxjas.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkeW10ZWVub2puandnYmx4amFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDE2NTY5MTIsImV4cCI6MjA1NzIzMjkxMn0.9Yx8c8Pc8Pc8Pc8Pc8Pc8Pc8Pc8Pc8Pc8Pc8Pc8'
        );

        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('form-title').innerText = isLogin ? 'Sign in to your account' : 'Create an account';
            document.getElementById('submit-btn').innerText = isLogin ? 'Sign In' : 'Sign Up';
            document.getElementById('toggle-link').innerText = isLogin ? "Don't have an account? Sign up" : "Already have an account? Sign in";
        }

        async function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            errorDiv.style.display = 'none';

            let response;
            if (isLogin) {
                response = await supabase.auth.signInWithPassword({ email, password });
            } else {
                response = await supabase.auth.signUp({ email, password });
            }

            const { error } = response;
            if (error) {
                errorDiv.innerText = error.message;
                errorDiv.style.display = 'block';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
